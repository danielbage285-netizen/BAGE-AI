<!DOCTYPE html>
<html>
<head>
<title>BAGE AI</title>
<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}
input, button{
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}
button{
background:#00ffcc;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🤖 BAGE AI</h1>

<!-- LOGIN -->
<h3>Login</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginStatus"></p>

<!-- CHAT -->
<h3>AI Chat</h3>
<input type="text" id="userInput" placeholder="Type message...">
<button onclick="aiChat()">Send</button>
<p id="chatReply"></p>

<!-- SHAYARI -->
<h3>Shayari</h3>
<button onclick="generateShayari()">Generate Shayari</button>

<!-- SONG -->
<h3>Song</h3>
<button onclick="generateSong()">Generate Song</button>

<!-- VOICE -->
<h3>Text to Voice</h3>
<input type="text" id="voiceText" placeholder="Enter text">
<button onclick="speakText()">Speak</button>

<!-- VIDEO -->
<h3>Video Generator</h3>
<input type="text" id="videoPrompt" placeholder="Enter prompt">
<button onclick="generateVideo()">Generate Video</button>
<p id="videoResult"></p>

<!-- PAYMENT -->
<h3>Subscription</h3>
<p>Free Plan</p>
<p>Pro Plan - ₹299</p>
<button onclick="upiPay()">Pay with UPI</button>
<p id="paymentStatus"></p>

<script>

// LOGIN
function login(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(email === "admin@bageai.com" && password === "1234"){
document.getElementById("loginStatus").innerText = "Login Successful ✅";
}else{
document.getElementById("loginStatus").innerText = "Wrong Email ❌";
}
}

// AI CHAT
async function aiChat(){
let input = document.getElementById("userInput").value;

if(!input){
alert("Type something");
return;
}

document.getElementById("chatReply").innerText = "Thinking... 🤖";

try{
const response = await fetch("https://bage-ai.vercel.app/api/chat", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ message: input })
});

const data = await response.json();
document.getElementById("chatReply").innerText = data.reply;

}catch(e){
document.getElementById("chatReply").innerText = "Error ❌";
}
}

// SHAYARI
function generateShayari(){
let shayari = [
"तेरी यादों का मौसम हर रोज़ आता है, दिल को चुपके से रुला जाता है।",
"तू पास नहीं फिर भी एहसास तेरा है, जैसे हर सांस में नाम तेरा है।",
"मोहब्बत अधूरी सही मगर सच्ची है, दिल में तेरी याद अब भी अच्छी है।"
];
let random = Math.floor(Math.random()*shayari.length);
alert(shayari[random]);
}

// SONG
function generateSong(){
let song = [
"दिल की धड़कन में तेरा नाम है, हर सुबह में तेरा पैगाम है।",
"तेरे बिना ये रात अधूरी है, तेरी याद ही मेरी मजबूरी है।",
"चाँद भी तुझसे जलने लगा है, तेरी मुस्कान में जादू छुपा है।"
];
let random = Math.floor(Math.random()*song.length);
alert(song[random]);
}

// VOICE
function speakText(){
let text = document.getElementById("voiceText").value;
let speech = new SpeechSynthesisUtterance(text);
speech.lang = "hi-IN";
speechSynthesis.speak(speech);
}

// VIDEO
function generateVideo(){
let prompt = document.getElementById("videoPrompt").value;
document.getElementById("videoResult").innerText =
"Generating video for: " + prompt;
}

// PAYMENT
function upiPay(){
document.getElementById("paymentStatus").innerText =
"UPI system coming soon 💳";
}

</script>

</body>
</html>
